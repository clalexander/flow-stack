version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 10
    target-branch: dev
    commit-message:
      prefix: 'chore'
      include: scope
    labels:
      - dependencies
      - automated
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:30'
    open-pull-requests-limit: 10
    target-branch: dev
    commit-message:
      prefix: 'ci'
      include: scope
    labels:
      - dependencies
      - github-actions
      - automated
